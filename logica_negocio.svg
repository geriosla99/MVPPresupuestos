<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1E3A8A"/>
    </marker>
  </defs>
  <rect width="1280" height="920" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1280" height="58" fill="#1E3A8A"/>
  <text x="640" y="30" fill="#FFFFFF" font-size="21" font-weight="700" text-anchor="middle">L&#243;gica de Negocio &#8212; TuPresupuesto</text>
  <text x="640" y="48" fill="#1EA64A" font-size="13" text-anchor="middle">Procesos clave, entradas, reglas y resultados</text>

  <!-- Actor -->
  <rect x="540" y="78" width="200" height="56" rx="28" fill="#1E3A8A"/>
  <circle cx="568" cy="106" r="16" fill="#FBBF24"/>
  <text x="568" y="112" fill="#1E3A8A" font-size="16" font-weight="800" text-anchor="middle">U</text>
  <text x="650" y="103" fill="#FFFFFF" font-size="13" font-weight="700">Usuario autenticado</text>
  <text x="650" y="120" fill="#FFFFFF" font-size="11" opacity="0.85">JWT requerido en cada acci&#243;n</text>
  <line x1="640" y1="134" x2="640" y2="158" stroke="#1E3A8A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== CARDS (3 col x 2 rows) ======
       col x: 50, 410, 770  width 320  gap 20
       row y: 168 (top bar 36 + body 180 = 216) and 412 -->

  <!-- CARD 1: Registrar movimiento (mint top) -->
  <rect x="50" y="168" width="320" height="216" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="50" y="168" width="320" height="36" rx="12" fill="#1EA64A"/>
  <text x="210" y="192" fill="#FFFFFF" font-size="14" font-weight="800" text-anchor="middle">1. Registrar movimiento</text>
  <text x="68" y="222" fill="#1E3A8A" font-size="11" font-weight="700">Entrada</text>
  <text x="68" y="238" fill="#1E293B" font-size="11">tipo, descripci&#243;n, categor&#237;a,</text>
  <text x="68" y="252" fill="#1E293B" font-size="11">monto, fecha, nota opcional</text>
  <text x="68" y="278" fill="#1E3A8A" font-size="11" font-weight="700">Regla</text>
  <text x="68" y="294" fill="#1E293B" font-size="11">monto &#62; 0 (decimales y</text>
  <text x="68" y="308" fill="#1E293B" font-size="11">cifras grandes permitidos)</text>
  <text x="68" y="334" fill="#1E3A8A" font-size="11" font-weight="700">Salida</text>
  <text x="68" y="350" fill="#1E293B" font-size="11">documento en transactions</text>
  <text x="68" y="364" fill="#64748B" font-size="10.5" font-style="italic">&#8594; impacta Dashboard y</text>
  <text x="68" y="376" fill="#64748B" font-size="10.5" font-style="italic">&#160;&#160; ejecuci&#243;n de presupuesto</text>

  <!-- CARD 2: Metas (ocean top) -->
  <rect x="410" y="168" width="320" height="216" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="410" y="168" width="320" height="36" rx="12" fill="#5C97F6"/>
  <text x="570" y="192" fill="#FFFFFF" font-size="14" font-weight="800" text-anchor="middle">2. Gestionar meta de ahorro</text>
  <text x="428" y="222" fill="#1E3A8A" font-size="11" font-weight="700">Entrada</text>
  <text x="428" y="238" fill="#1E293B" font-size="11">nombre, objetivo, acumulado,</text>
  <text x="428" y="252" fill="#1E293B" font-size="11">&#237;cono, fecha l&#237;mite</text>
  <text x="428" y="278" fill="#1E3A8A" font-size="11" font-weight="700">Reglas</text>
  <text x="428" y="294" fill="#1E293B" font-size="11">Aportar: acumulado += aporte</text>
  <text x="428" y="308" fill="#64748B" font-size="10.5">&#160;&#160;&#160;&#160;(suma at&#243;mica en Firestore)</text>
  <text x="428" y="322" fill="#1E293B" font-size="11">Ajustar: acumulado = nuevo</text>
  <text x="428" y="348" fill="#1E3A8A" font-size="11" font-weight="700">Salida</text>
  <text x="428" y="364" fill="#1E293B" font-size="11">progreso visible con barra</text>
  <text x="428" y="378" fill="#64748B" font-size="10.5" font-style="italic">color seg&#250;n % cumplimiento</text>

  <!-- CARD 3: Presupuesto definir (amber top) -->
  <rect x="770" y="168" width="320" height="216" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="770" y="168" width="320" height="36" rx="12" fill="#FBBF24"/>
  <text x="930" y="192" fill="#1E3A8A" font-size="14" font-weight="800" text-anchor="middle">3. Definir presupuesto del mes</text>
  <text x="788" y="222" fill="#1E3A8A" font-size="11" font-weight="700">Entrada</text>
  <text x="788" y="238" fill="#1E293B" font-size="11">mes (YYYY-MM) + l&#237;mites</text>
  <text x="788" y="252" fill="#1E293B" font-size="11">por categor&#237;a de gasto</text>
  <text x="788" y="278" fill="#1E3A8A" font-size="11" font-weight="700">Regla</text>
  <text x="788" y="294" fill="#1E293B" font-size="11">Reemplazo total: se borran</text>
  <text x="788" y="308" fill="#1E293B" font-size="11">los &#237;tems previos del mes y</text>
  <text x="788" y="322" fill="#1E293B" font-size="11">se insertan los nuevos.</text>
  <text x="788" y="348" fill="#1E3A8A" font-size="11" font-weight="700">Salida</text>
  <text x="788" y="364" fill="#1E293B" font-size="11">presupuesto persistido</text>
  <text x="788" y="378" fill="#64748B" font-size="10.5" font-style="italic">&#250;nico por (usuario, cat, mes)</text>

  <!-- CARD 4: Dashboard (navy top) -->
  <rect x="50" y="412" width="320" height="216" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="50" y="412" width="320" height="36" rx="12" fill="#1E3A8A"/>
  <text x="210" y="436" fill="#FFFFFF" font-size="14" font-weight="800" text-anchor="middle">4. Consultar dashboard</text>
  <text x="68" y="466" fill="#1E3A8A" font-size="11" font-weight="700">Entrada</text>
  <text x="68" y="482" fill="#1E293B" font-size="11">usuario autenticado</text>
  <text x="68" y="508" fill="#1E3A8A" font-size="11" font-weight="700">C&#225;lculos</text>
  <text x="68" y="524" fill="#1E293B" font-size="11">Balance = Ingresos &#8722; Gastos</text>
  <text x="68" y="538" fill="#1E293B" font-size="11">% categor&#237;a = total_cat /</text>
  <text x="68" y="552" fill="#1E293B" font-size="11">&#160;&#160;&#160;&#160;total_gastos &#215; 100</text>
  <text x="68" y="578" fill="#1E3A8A" font-size="11" font-weight="700">Salida</text>
  <text x="68" y="594" fill="#1E293B" font-size="11">tarjetas + gr&#225;fica mensual</text>
  <text x="68" y="608" fill="#1E293B" font-size="11">+ desglose + recientes</text>

  <!-- CARD 5: Reportes (violet top) -->
  <rect x="410" y="412" width="320" height="216" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="410" y="412" width="320" height="36" rx="12" fill="#7C3AED"/>
  <text x="570" y="436" fill="#FFFFFF" font-size="14" font-weight="800" text-anchor="middle">5. Generar reportes</text>
  <text x="428" y="466" fill="#1E3A8A" font-size="11" font-weight="700">Entrada</text>
  <text x="428" y="482" fill="#1E293B" font-size="11">periodo: mes/trimestre/</text>
  <text x="428" y="496" fill="#1E293B" font-size="11">semestre/a&#241;o/todo</text>
  <text x="428" y="522" fill="#1E3A8A" font-size="11" font-weight="700">C&#225;lculos</text>
  <text x="428" y="538" fill="#1E293B" font-size="11">Tasa ahorro = Balance /</text>
  <text x="428" y="552" fill="#1E293B" font-size="11">&#160;&#160;&#160;&#160;Ingresos &#215; 100 %</text>
  <text x="428" y="578" fill="#1E3A8A" font-size="11" font-weight="700">Salida</text>
  <text x="428" y="594" fill="#1E293B" font-size="11">4 gr&#225;ficos (barras, l&#237;nea,</text>
  <text x="428" y="608" fill="#1E293B" font-size="11">dona) + ranking categor&#237;as</text>

  <!-- CARD 6: Control presupuesto (rose top) -->
  <rect x="770" y="412" width="320" height="216" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="770" y="412" width="320" height="36" rx="12" fill="#F43F5E"/>
  <text x="930" y="436" fill="#FFFFFF" font-size="14" font-weight="800" text-anchor="middle">6. Controlar presupuesto</text>
  <text x="788" y="466" fill="#1E3A8A" font-size="11" font-weight="700">Entrada</text>
  <text x="788" y="482" fill="#1E293B" font-size="11">mes a consultar</text>
  <text x="788" y="508" fill="#1E3A8A" font-size="11" font-weight="700">C&#225;lculo en vivo</text>
  <text x="788" y="524" fill="#1E293B" font-size="11">Gastado_cat = &#931; montos de</text>
  <text x="788" y="538" fill="#1E293B" font-size="11">gastos del mes en esa cat.</text>
  <text x="788" y="552" fill="#1E293B" font-size="11">Exceso: Gastado &#62; L&#237;mite</text>
  <text x="788" y="578" fill="#1E3A8A" font-size="11" font-weight="700">Salida</text>
  <text x="788" y="594" fill="#1E293B" font-size="11">sem&#225;foro (verde &#60;50%,</text>
  <text x="788" y="608" fill="#1E293B" font-size="11">&#225;mbar &#62;80%, rojo si excede)</text>

  <!-- Reglas destacadas (panel) -->
  <rect x="50" y="660" width="1040" height="130" rx="12" fill="#F0F4F8" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="70" y="684" fill="#1E3A8A" font-size="14" font-weight="800">Reglas de negocio destacadas</text>
  <text x="70" y="710" fill="#1E293B" font-size="12">&#8226; <tspan font-weight="700">Balance</tspan> = Ingresos del mes &#8722; Gastos del mes.</text>
  <text x="70" y="730" fill="#1E293B" font-size="12">&#8226; <tspan font-weight="700">Tasa de ahorro</tspan> = (Balance / Ingresos) &#215; 100 % &#160;&#8211;&#160; 0 si no hay ingresos.</text>
  <text x="70" y="750" fill="#1E293B" font-size="12">&#8226; <tspan font-weight="700">Progreso de meta</tspan> = (Monto acumulado / Monto objetivo) &#215; 100 %.</text>
  <text x="70" y="770" fill="#1E293B" font-size="12">&#8226; <tspan font-weight="700">Alerta de presupuesto</tspan>: una categor&#237;a est&#225; excedida cuando Gastado_mes &#62; L&#237;mite_mensual.</text>

  <!-- Pie: flujo de datos -->
  <rect x="50" y="810" width="1040" height="60" rx="10" fill="#1E3A8A"/>
  <text x="570" y="836" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">Flujo de datos:  Frontend React  &#8594;  API REST /api  &#8594;  Firestore (users/{uid}/...)</text>
  <text x="570" y="855" fill="#FBBF24" font-size="11" text-anchor="middle">Aislamiento por subcolecci&#243;n del usuario  &#183;  Autorizaci&#243;n JWT en cada petici&#243;n</text>
</svg>
