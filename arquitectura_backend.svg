<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 880" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0A2342"/>
    </marker>
    <marker id="arrowT" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#028090"/>
    </marker>
  </defs>

  <rect width="1080" height="880" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1080" height="58" fill="#0A2342"/>
  <text x="540" y="30" fill="#FFFFFF" font-size="21" font-weight="700" text-anchor="middle">Arquitectura del Backend &#8212; TuPresupuesto</text>
  <text x="540" y="48" fill="#02C39A" font-size="13" text-anchor="middle">FastAPI &#183; Firebase Admin SDK &#183; Pydantic v2 &#183; JWT &#183; Firestore (NoSQL)</text>

  <!-- Frontend origin -->
  <rect x="340" y="76" width="400" height="40" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="540" y="101" fill="#1E293B" font-size="13.5" font-weight="600" text-anchor="middle">Frontend React &#8212; petici&#243;n HTTP a /api/...  (Bearer JWT)</text>
  <line x1="540" y1="116" x2="540" y2="138" stroke="#0A2342" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Main container -->
  <rect x="40" y="142" width="1000" height="582" rx="12" fill="#F0F4F8" stroke="#028090" stroke-width="2"/>
  <text x="62" y="167" fill="#028090" font-size="14" font-weight="700">Aplicaci&#243;n Backend &#8212; FastAPI (paquete app/)</text>

  <!-- main.py -->
  <rect x="70" y="180" width="940" height="40" rx="7" fill="#028090"/>
  <text x="540" y="205" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">main.py  &#8212;  instancia FastAPI  &#183;  CORS middleware  &#183;  monta los routers bajo el prefijo /api</text>

  <!-- Security / deps band -->
  <rect x="70" y="234" width="940" height="58" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.3"/>
  <text x="86" y="254" fill="#0369A1" font-size="12.5" font-weight="700">Seguridad y dependencias (transversal a todos los endpoints protegidos)</text>
  <rect x="86" y="260" width="450" height="26" rx="5" fill="#FFFFFF" stroke="#0EA5E9"/>
  <text x="311" y="277" fill="#1E293B" font-size="11" text-anchor="middle">deps.py &#8212; get_current_user: extrae y valida el JWT del header</text>
  <rect x="546" y="260" width="450" height="26" rx="5" fill="#FFFFFF" stroke="#0EA5E9"/>
  <text x="771" y="277" fill="#1E293B" font-size="11" text-anchor="middle">security.py &#8212; bcrypt (hash de contrase&#241;as) + JWT HS256</text>

  <!-- Routers -->
  <rect x="70" y="306" width="940" height="108" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <text x="86" y="326" fill="#0A2342" font-size="13" font-weight="700">Routers (app/routers) &#8212; endpoints REST</text>
  <rect x="86" y="334" width="176" height="68" rx="6" fill="#EDE9FE" stroke="#7C3AED"/>
  <text x="174" y="356" fill="#5B21B6" font-size="12" font-weight="700" text-anchor="middle">auth.py</text>
  <text x="174" y="374" fill="#5B21B6" font-size="10" text-anchor="middle">register &#183; login</text>
  <text x="174" y="388" fill="#5B21B6" font-size="10" text-anchor="middle">me</text>
  <rect x="270" y="334" width="176" height="68" rx="6" fill="#D1FAE5" stroke="#02C39A"/>
  <text x="358" y="356" fill="#065F46" font-size="12" font-weight="700" text-anchor="middle">transactions.py</text>
  <text x="358" y="374" fill="#065F46" font-size="10" text-anchor="middle">CRUD de ingresos</text>
  <text x="358" y="388" fill="#065F46" font-size="10" text-anchor="middle">y gastos &#183; recent</text>
  <rect x="454" y="334" width="176" height="68" rx="6" fill="#E0F2FE" stroke="#0EA5E9"/>
  <text x="542" y="356" fill="#0369A1" font-size="12" font-weight="700" text-anchor="middle">summary.py</text>
  <text x="542" y="374" fill="#0369A1" font-size="10" text-anchor="middle">resumen mensual</text>
  <text x="542" y="388" fill="#0369A1" font-size="10" text-anchor="middle">y serie hist&#243;rica</text>
  <rect x="638" y="334" width="176" height="68" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="726" y="356" fill="#92400E" font-size="12" font-weight="700" text-anchor="middle">goals.py</text>
  <text x="726" y="374" fill="#92400E" font-size="10" text-anchor="middle">CRUD de metas</text>
  <text x="726" y="388" fill="#92400E" font-size="10" text-anchor="middle">+ contribute</text>
  <rect x="822" y="334" width="172" height="68" rx="6" fill="#FFE4E6" stroke="#F43F5E"/>
  <text x="908" y="356" fill="#9F1239" font-size="12" font-weight="700" text-anchor="middle">budget.py</text>
  <text x="908" y="374" fill="#9F1239" font-size="10" text-anchor="middle">presupuesto mensual</text>
  <text x="908" y="388" fill="#9F1239" font-size="10" text-anchor="middle">GET / PUT</text>

  <line x1="540" y1="414" x2="540" y2="430" stroke="#0A2342" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Schemas -->
  <rect x="70" y="432" width="940" height="46" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="86" y="452" fill="#92400E" font-size="12.5" font-weight="700">schemas.py &#8212; esquemas Pydantic</text>
  <text x="86" y="469" fill="#1E293B" font-size="11">Validan los datos de entrada y serializan la salida de cada endpoint (UserOut, TransactionOut, GoalOut, BudgetItemOut, ...)</text>

  <line x1="540" y1="478" x2="540" y2="494" stroke="#0A2342" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Firestore collections -->
  <rect x="70" y="496" width="940" height="86" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <text x="86" y="516" fill="#0A2342" font-size="13" font-weight="700">firebase.py &#8212; colecciones de Firestore (NoSQL)</text>
  <rect x="86" y="524" width="220" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="196" y="545" fill="#92400E" font-size="12" font-weight="700" text-anchor="middle">users</text>
  <text x="196" y="561" fill="#92400E" font-size="10" text-anchor="middle">email, nombre, hashed_password</text>
  <rect x="318" y="524" width="220" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="428" y="545" fill="#92400E" font-size="12" font-weight="700" text-anchor="middle">users/{uid}/transactions</text>
  <text x="428" y="561" fill="#92400E" font-size="10" text-anchor="middle">tipo, categoria, monto, fecha</text>
  <rect x="550" y="524" width="220" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="660" y="545" fill="#92400E" font-size="12" font-weight="700" text-anchor="middle">users/{uid}/goals</text>
  <text x="660" y="561" fill="#92400E" font-size="10" text-anchor="middle">monto_objetivo, monto_actual</text>
  <rect x="782" y="524" width="212" height="48" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="888" y="545" fill="#92400E" font-size="12" font-weight="700" text-anchor="middle">users/{uid}/budget_items</text>
  <text x="888" y="561" fill="#92400E" font-size="10" text-anchor="middle">categoria, limite_mensual, month</text>

  <line x1="540" y1="582" x2="540" y2="598" stroke="#0A2342" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- firebase & config -->
  <rect x="70" y="600" width="610" height="46" rx="7" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="375" y="620" fill="#0A2342" font-size="12" font-weight="700" text-anchor="middle">firebase.py</text>
  <text x="375" y="637" fill="#64748B" font-size="10.5" text-anchor="middle">inicializa Firebase Admin SDK &#183; expone el cliente de Firestore &#183; helpers de colecciones</text>
  <rect x="694" y="600" width="316" height="46" rx="7" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="852" y="620" fill="#0A2342" font-size="12" font-weight="700" text-anchor="middle">config.py</text>
  <text x="852" y="637" fill="#64748B" font-size="10.5" text-anchor="middle">FIREBASE_PROJECT_ID &#183; credenciales</text>

  <line x1="540" y1="646" x2="540" y2="664" stroke="#028090" stroke-width="1.8" marker-end="url(#arrowT)"/>
  <text x="556" y="660" fill="#028090" font-size="11" font-weight="600">Firebase Admin SDK &#183; gRPC</text>

  <!-- Database -->
  <rect x="240" y="666" width="600" height="40" rx="9" fill="#F59E0B"/>
  <text x="540" y="691" fill="#FFFFFF" font-size="13.5" font-weight="700" text-anchor="middle">Firebase Firestore  &#183;  proyecto: tupresupuesto-901b0</text>

  <!-- collection chips -->
  <rect x="240" y="716" width="138" height="32" rx="6" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="309" y="736" fill="#92400E" font-size="11.5" font-weight="600" text-anchor="middle">users</text>
  <rect x="392" y="716" width="138" height="32" rx="6" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="461" y="736" fill="#92400E" font-size="10.5" font-weight="600" text-anchor="middle">.../transactions</text>
  <rect x="544" y="716" width="138" height="32" rx="6" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="613" y="736" fill="#92400E" font-size="11.5" font-weight="600" text-anchor="middle">.../goals</text>
  <rect x="696" y="716" width="144" height="32" rx="6" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="768" y="736" fill="#92400E" font-size="11.5" font-weight="600" text-anchor="middle">.../budget_items</text>

  <text x="540" y="772" fill="#64748B" font-size="10.5" font-style="italic" text-anchor="middle">Las colecciones se materializan al primer write &#183; subcolecciones por usuario &#183; sin schema fijo (NoSQL)</text>
</svg>
