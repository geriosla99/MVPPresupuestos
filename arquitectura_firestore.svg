<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 980" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0A2342"/>
    </marker>
  </defs>

  <rect width="1080" height="980" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1080" height="58" fill="#0A2342"/>
  <text x="540" y="30" fill="#FFFFFF" font-size="21" font-weight="700" text-anchor="middle">Arquitectura de la Base de Datos &#8212; Firebase Firestore</text>
  <text x="540" y="48" fill="#02C39A" font-size="13" text-anchor="middle">TuPresupuesto &#183; NoSQL document store &#183; subcolecciones por usuario</text>

  <!-- Firestore root -->
  <rect x="340" y="76" width="400" height="50" rx="9" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="540" y="100" fill="#92400E" font-size="14" font-weight="700" text-anchor="middle">Firestore database</text>
  <text x="540" y="117" fill="#92400E" font-size="11.5" text-anchor="middle">project: tupresupuesto-901b0  &#183;  (default)</text>
  <line x1="540" y1="126" x2="540" y2="148" stroke="#0A2342" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- users collection -->
  <rect x="390" y="150" width="300" height="42" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="540" y="170" fill="#92400E" font-size="13" font-weight="700" text-anchor="middle">&#128193;  users  (colecci&#243;n)</text>
  <text x="540" y="185" fill="#92400E" font-size="10.5" text-anchor="middle">una entrada por usuario registrado</text>
  <line x1="540" y1="192" x2="540" y2="214" stroke="#0A2342" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- user document -->
  <rect x="200" y="218" width="680" height="166" rx="10" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.6"/>
  <rect x="200" y="218" width="680" height="32" rx="10" fill="#0A2342"/>
  <text x="540" y="239" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">&#128462;  {user_id}  (documento)</text>

  <!-- user fields table -->
  <text x="216" y="269" fill="#0A2342" font-size="12" font-weight="700">Campos</text>

  <rect x="216" y="277" width="320" height="22" fill="#F1F5F9"/>
  <text x="226" y="293" fill="#1E293B" font-size="11.5" font-weight="600">email</text>
  <text x="406" y="293" fill="#64748B" font-size="11">string  &#183;  &#250;nico</text>

  <rect x="216" y="299" width="320" height="22" fill="#FFFFFF"/>
  <text x="226" y="315" fill="#1E293B" font-size="11.5" font-weight="600">nombre</text>
  <text x="406" y="315" fill="#64748B" font-size="11">string</text>

  <rect x="544" y="277" width="320" height="22" fill="#F1F5F9"/>
  <text x="554" y="293" fill="#1E293B" font-size="11.5" font-weight="600">hashed_password</text>
  <text x="744" y="293" fill="#64748B" font-size="11">string  &#183;  bcrypt</text>

  <rect x="544" y="299" width="320" height="22" fill="#FFFFFF"/>
  <text x="554" y="315" fill="#1E293B" font-size="11.5" font-weight="600">created_at</text>
  <text x="744" y="315" fill="#64748B" font-size="11">timestamp</text>

  <text x="216" y="345" fill="#64748B" font-size="11" font-style="italic">Tres subcolecciones cuelgan de cada usuario &#8594;</text>

  <!-- branches lines -->
  <line x1="540" y1="384" x2="540" y2="402" stroke="#0A2342" stroke-width="1.4"/>
  <line x1="200" y1="402" x2="880" y2="402" stroke="#0A2342" stroke-width="1.4"/>
  <line x1="200" y1="402" x2="200" y2="420" stroke="#0A2342" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="540" y1="402" x2="540" y2="420" stroke="#0A2342" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="880" y1="402" x2="880" y2="420" stroke="#0A2342" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- subcollection labels -->
  <rect x="60" y="424" width="280" height="40" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="200" y="442" fill="#92400E" font-size="12.5" font-weight="700" text-anchor="middle">&#128193;  transactions  (subcolecci&#243;n)</text>
  <text x="200" y="458" fill="#92400E" font-size="10.5" text-anchor="middle">ingresos y gastos del usuario</text>

  <rect x="400" y="424" width="280" height="40" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="540" y="442" fill="#92400E" font-size="12.5" font-weight="700" text-anchor="middle">&#128193;  goals  (subcolecci&#243;n)</text>
  <text x="540" y="458" fill="#92400E" font-size="10.5" text-anchor="middle">metas de ahorro</text>

  <rect x="740" y="424" width="280" height="40" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="880" y="442" fill="#92400E" font-size="12.5" font-weight="700" text-anchor="middle">&#128193;  budget_items  (subcolecci&#243;n)</text>
  <text x="880" y="458" fill="#92400E" font-size="10.5" text-anchor="middle">l&#237;mites por categor&#237;a y mes</text>

  <line x1="200" y1="464" x2="200" y2="482" stroke="#0A2342" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="540" y1="464" x2="540" y2="482" stroke="#0A2342" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="880" y1="464" x2="880" y2="482" stroke="#0A2342" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- transactions document -->
  <rect x="60" y="486" width="280" height="226" rx="10" fill="#FFFFFF" stroke="#02C39A" stroke-width="1.6"/>
  <rect x="60" y="486" width="280" height="30" rx="10" fill="#02C39A"/>
  <text x="200" y="506" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle">&#128462;  {tx_id}  (documento)</text>
  <text x="74" y="534" fill="#1E293B" font-size="11" font-weight="700">tipo</text>
  <text x="190" y="534" fill="#64748B" font-size="10.5">"ingreso" | "gasto"</text>
  <line x1="70" y1="540" x2="330" y2="540" stroke="#F1F5F9"/>
  <text x="74" y="556" fill="#1E293B" font-size="11" font-weight="700">descripcion</text>
  <text x="190" y="556" fill="#64748B" font-size="10.5">string</text>
  <line x1="70" y1="562" x2="330" y2="562" stroke="#F1F5F9"/>
  <text x="74" y="578" fill="#1E293B" font-size="11" font-weight="700">categoria</text>
  <text x="190" y="578" fill="#64748B" font-size="10.5">string</text>
  <line x1="70" y1="584" x2="330" y2="584" stroke="#F1F5F9"/>
  <text x="74" y="600" fill="#1E293B" font-size="11" font-weight="700">monto</text>
  <text x="190" y="600" fill="#64748B" font-size="10.5">number</text>
  <line x1="70" y1="606" x2="330" y2="606" stroke="#F1F5F9"/>
  <text x="74" y="622" fill="#1E293B" font-size="11" font-weight="700">fecha</text>
  <text x="190" y="622" fill="#64748B" font-size="10.5">string  &#183;  YYYY-MM-DD</text>
  <line x1="70" y1="628" x2="330" y2="628" stroke="#F1F5F9"/>
  <text x="74" y="644" fill="#1E293B" font-size="11" font-weight="700">nota</text>
  <text x="190" y="644" fill="#64748B" font-size="10.5">string  &#183;  opcional</text>
  <text x="74" y="678" fill="#64748B" font-size="10" font-style="italic">Filtros principales:</text>
  <text x="74" y="694" fill="#64748B" font-size="10">where tipo == "gasto"  ·</text>
  <text x="74" y="708" fill="#64748B" font-size="10">where fecha &gt;= 'YYYY-MM-01'</text>

  <!-- goals document -->
  <rect x="400" y="486" width="280" height="226" rx="10" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.6"/>
  <rect x="400" y="486" width="280" height="30" rx="10" fill="#F59E0B"/>
  <text x="540" y="506" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle">&#128462;  {goal_id}  (documento)</text>
  <text x="414" y="534" fill="#1E293B" font-size="11" font-weight="700">nombre</text>
  <text x="540" y="534" fill="#64748B" font-size="10.5">string</text>
  <line x1="410" y1="540" x2="670" y2="540" stroke="#F1F5F9"/>
  <text x="414" y="556" fill="#1E293B" font-size="11" font-weight="700">monto_objetivo</text>
  <text x="540" y="556" fill="#64748B" font-size="10.5">number</text>
  <line x1="410" y1="562" x2="670" y2="562" stroke="#F1F5F9"/>
  <text x="414" y="578" fill="#1E293B" font-size="11" font-weight="700">monto_actual</text>
  <text x="540" y="578" fill="#64748B" font-size="10.5">number</text>
  <line x1="410" y1="584" x2="670" y2="584" stroke="#F1F5F9"/>
  <text x="414" y="600" fill="#1E293B" font-size="11" font-weight="700">icono</text>
  <text x="540" y="600" fill="#64748B" font-size="10.5">string  &#183;  emoji</text>
  <line x1="410" y1="606" x2="670" y2="606" stroke="#F1F5F9"/>
  <text x="414" y="622" fill="#1E293B" font-size="11" font-weight="700">fecha_limite</text>
  <text x="540" y="622" fill="#64748B" font-size="10.5">string  &#183;  YYYY-MM-DD &#183; null</text>
  <text x="414" y="668" fill="#64748B" font-size="10" font-style="italic">Aportar usa</text>
  <text x="414" y="684" fill="#64748B" font-size="10">firestore.Increment(monto)</text>
  <text x="414" y="700" fill="#64748B" font-size="10" font-style="italic">para una suma at&#243;mica.</text>

  <!-- budget_items document -->
  <rect x="740" y="486" width="280" height="226" rx="10" fill="#FFFFFF" stroke="#F43F5E" stroke-width="1.6"/>
  <rect x="740" y="486" width="280" height="30" rx="10" fill="#F43F5E"/>
  <text x="880" y="506" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle">&#128462;  {item_id}  (documento)</text>
  <text x="754" y="534" fill="#1E293B" font-size="11" font-weight="700">categoria</text>
  <text x="880" y="534" fill="#64748B" font-size="10.5">string</text>
  <line x1="750" y1="540" x2="1010" y2="540" stroke="#F1F5F9"/>
  <text x="754" y="556" fill="#1E293B" font-size="11" font-weight="700">limite_mensual</text>
  <text x="880" y="556" fill="#64748B" font-size="10.5">number</text>
  <line x1="750" y1="562" x2="1010" y2="562" stroke="#F1F5F9"/>
  <text x="754" y="578" fill="#1E293B" font-size="11" font-weight="700">month</text>
  <text x="880" y="578" fill="#64748B" font-size="10.5">string  &#183;  YYYY-MM</text>
  <text x="754" y="616" fill="#64748B" font-size="10" font-style="italic">Llave l&#243;gica:</text>
  <text x="754" y="630" fill="#64748B" font-size="10">(user, categoria, month)</text>
  <text x="754" y="660" fill="#64748B" font-size="10" font-style="italic">El campo `gastado` no se</text>
  <text x="754" y="674" fill="#64748B" font-size="10" font-style="italic">guarda: se calcula en vivo</text>
  <text x="754" y="688" fill="#64748B" font-size="10" font-style="italic">sumando transactions del mes.</text>

  <!-- Notes / decisiones -->
  <rect x="60" y="740" width="960" height="120" rx="10" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.4"/>
  <text x="78" y="762" fill="#0369A1" font-size="13" font-weight="700">Decisiones de modelado</text>
  <text x="78" y="784" fill="#0A2342" font-size="11.5">&#8226;  Subcolecciones por usuario (users/{uid}/...) en lugar de colecciones planas: a&#237;sla datos y simplifica las reglas de seguridad.</text>
  <text x="78" y="804" fill="#0A2342" font-size="11.5">&#8226;  Fechas como string ISO (YYYY-MM-DD): permiten consultas por rango con orden alfab&#233;tico = orden cronol&#243;gico.</text>
  <text x="78" y="824" fill="#0A2342" font-size="11.5">&#8226;  IDs autogenerados por Firestore (strings de 20 caracteres). En el frontend se usan como key de React sin problema.</text>
  <text x="78" y="844" fill="#0A2342" font-size="11.5">&#8226;  Borrado en cascada manual: al eliminar un usuario hay que borrar sus subcolecciones (o usar una Cloud Function).</text>

  <!-- Legend -->
  <rect x="60" y="884" width="960" height="56" rx="8" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="78" y="904" fill="#0A2342" font-size="11.5" font-weight="700">Convenciones</text>
  <rect x="78" y="912" width="22" height="14" rx="3" fill="#FFF7ED" stroke="#F59E0B"/>
  <text x="108" y="924" fill="#64748B" font-size="11">colecci&#243;n / subcolecci&#243;n</text>
  <rect x="280" y="912" width="22" height="14" rx="3" fill="#FFFFFF" stroke="#0A2342"/>
  <text x="310" y="924" fill="#64748B" font-size="11">documento</text>
  <text x="430" y="924" fill="#64748B" font-size="11">&#8226;  los campos dentro de cada documento son tipados pero no tienen schema fijo (NoSQL)</text>
</svg>
