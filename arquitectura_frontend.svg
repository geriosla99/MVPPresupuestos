<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 880" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0A2342"/>
    </marker>
    <marker id="arrowT" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#028090"/>
    </marker>
  </defs>

  <rect width="1080" height="880" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="1080" height="58" fill="#0A2342"/>
  <text x="540" y="30" fill="#FFFFFF" font-size="21" font-weight="700" text-anchor="middle">Arquitectura del Frontend &#8212; TuPresupuesto</text>
  <text x="540" y="48" fill="#02C39A" font-size="13" text-anchor="middle">React 18 &#183; React Router v6 &#183; Axios &#183; Chart.js</text>

  <!-- Usuario -->
  <rect x="390" y="76" width="300" height="40" rx="8" fill="#FFFFFF" stroke="#0A2342" stroke-width="1.5"/>
  <text x="540" y="101" fill="#1E293B" font-size="14" font-weight="600" text-anchor="middle">Usuario / Navegador web</text>
  <line x1="540" y1="116" x2="540" y2="138" stroke="#0A2342" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Main SPA container -->
  <rect x="40" y="142" width="1000" height="606" rx="12" fill="#F0F4F8" stroke="#028090" stroke-width="2"/>
  <text x="62" y="167" fill="#028090" font-size="14" font-weight="700">Aplicaci&#243;n React &#8212; Single Page Application (SPA)</text>

  <!-- index / App -->
  <rect x="70" y="180" width="940" height="36" rx="7" fill="#028090"/>
  <text x="540" y="203" fill="#FFFFFF" font-size="13.5" font-weight="600" text-anchor="middle">index.js  &#8594;  App.jsx  &#183;  BrowserRouter (define rutas p&#250;blicas y privadas)</text>

  <!-- AuthContext band -->
  <rect x="70" y="230" width="940" height="46" rx="7" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.3"/>
  <text x="86" y="251" fill="#0369A1" font-size="13" font-weight="700">AuthContext / AuthProvider</text>
  <text x="86" y="268" fill="#1E293B" font-size="12">Estado global de sesi&#243;n: login / register / logout &#183; persiste token y usuario en localStorage &#183; revalida con /auth/me</text>

  <!-- Routing: public -->
  <rect x="70" y="290" width="300" height="178" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <text x="220" y="312" fill="#0A2342" font-size="13" font-weight="700" text-anchor="middle">Rutas p&#250;blicas</text>
  <rect x="92" y="326" width="256" height="58" rx="6" fill="#F0F4F8" stroke="#CBD5E1"/>
  <text x="220" y="350" fill="#1E293B" font-size="12.5" font-weight="600" text-anchor="middle">Login.jsx</text>
  <text x="220" y="368" fill="#64748B" font-size="11" text-anchor="middle">Inicio de sesi&#243;n</text>
  <rect x="92" y="394" width="256" height="58" rx="6" fill="#F0F4F8" stroke="#CBD5E1"/>
  <text x="220" y="418" fill="#1E293B" font-size="12.5" font-weight="600" text-anchor="middle">Register.jsx</text>
  <text x="220" y="436" fill="#64748B" font-size="11" text-anchor="middle">Registro de usuario</text>

  <!-- Routing: private -->
  <rect x="400" y="290" width="610" height="178" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <text x="705" y="312" fill="#0A2342" font-size="13" font-weight="700" text-anchor="middle">Rutas privadas</text>
  <rect x="422" y="326" width="180" height="126" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="512" y="350" fill="#92400E" font-size="12.5" font-weight="700" text-anchor="middle">ProtectedRoute</text>
  <text x="512" y="372" fill="#92400E" font-size="11" text-anchor="middle">Verifica que exista</text>
  <text x="512" y="386" fill="#92400E" font-size="11" text-anchor="middle">sesi&#243;n activa; si no,</text>
  <text x="512" y="400" fill="#92400E" font-size="11" text-anchor="middle">redirige a /login</text>
  <rect x="624" y="326" width="364" height="126" rx="6" fill="#F0F4F8" stroke="#CBD5E1"/>
  <text x="806" y="348" fill="#0A2342" font-size="12.5" font-weight="700" text-anchor="middle">AppLayout.jsx</text>
  <rect x="640" y="358" width="105" height="34" rx="5" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="692" y="379" fill="#1E293B" font-size="11" text-anchor="middle">Sidebar</text>
  <rect x="753" y="358" width="105" height="34" rx="5" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="805" y="379" fill="#1E293B" font-size="11" text-anchor="middle">Topbar</text>
  <rect x="866" y="358" width="106" height="34" rx="5" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="919" y="379" fill="#1E293B" font-size="11" text-anchor="middle">MobileNav</text>
  <rect x="640" y="400" width="332" height="36" rx="5" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="806" y="423" fill="#64748B" font-size="11.5" text-anchor="middle">&#60;Outlet/&#62; &#8212; renderiza la p&#225;gina activa</text>

  <!-- Pages -->
  <rect x="70" y="482" width="940" height="78" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <text x="86" y="502" fill="#0A2342" font-size="13" font-weight="700">P&#225;ginas (src/pages)</text>
  <rect x="86" y="510" width="168" height="38" rx="6" fill="#EDE9FE" stroke="#7C3AED"/>
  <text x="170" y="534" fill="#5B21B6" font-size="12" font-weight="600" text-anchor="middle">Dashboard</text>
  <rect x="262" y="510" width="168" height="38" rx="6" fill="#D1FAE5" stroke="#02C39A"/>
  <text x="346" y="534" fill="#065F46" font-size="12" font-weight="600" text-anchor="middle">Ingresos</text>
  <rect x="438" y="510" width="168" height="38" rx="6" fill="#FFE4E6" stroke="#F43F5E"/>
  <text x="522" y="534" fill="#9F1239" font-size="12" font-weight="600" text-anchor="middle">Gastos</text>
  <rect x="614" y="510" width="168" height="38" rx="6" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="698" y="534" fill="#92400E" font-size="12" font-weight="600" text-anchor="middle">Metas</text>
  <rect x="790" y="510" width="204" height="38" rx="6" fill="#E0F2FE" stroke="#0EA5E9"/>
  <text x="892" y="534" fill="#0369A1" font-size="12" font-weight="600" text-anchor="middle">Presupuesto</text>
  <text x="540" y="572" fill="#64748B" font-size="11" font-style="italic" text-anchor="middle">Ingresos y Gastos reutilizan el componente compartido TransactionsPage (lista + formulario CRUD)</text>

  <!-- API service layer -->
  <rect x="70" y="586" width="940" height="92" rx="8" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="86" y="606" fill="#92400E" font-size="13" font-weight="700">Capa de servicios (src/api)</text>
  <rect x="86" y="614" width="250" height="54" rx="6" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="211" y="634" fill="#1E293B" font-size="12" font-weight="700" text-anchor="middle">axios.js</text>
  <text x="211" y="650" fill="#64748B" font-size="10.5" text-anchor="middle">Interceptores: a&#241;ade el JWT</text>
  <text x="211" y="662" fill="#64748B" font-size="10.5" text-anchor="middle">a cada petici&#243;n &#183; maneja el 401</text>
  <line x1="336" y1="641" x2="362" y2="641" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowT)"/>
  <rect x="364" y="614" width="150" height="54" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="439" y="638" fill="#1E293B" font-size="11.5" font-weight="600" text-anchor="middle">auth.js</text>
  <text x="439" y="654" fill="#64748B" font-size="10" text-anchor="middle">/auth/*</text>
  <rect x="522" y="614" width="150" height="54" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="597" y="638" fill="#1E293B" font-size="11.5" font-weight="600" text-anchor="middle">transactions.js</text>
  <text x="597" y="654" fill="#64748B" font-size="10" text-anchor="middle">/transactions &#183; /summary</text>
  <rect x="680" y="614" width="150" height="54" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="755" y="638" fill="#1E293B" font-size="11.5" font-weight="600" text-anchor="middle">goals.js</text>
  <text x="755" y="654" fill="#64748B" font-size="10" text-anchor="middle">/goals</text>
  <rect x="838" y="614" width="156" height="54" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="916" y="638" fill="#1E293B" font-size="11.5" font-weight="600" text-anchor="middle">budget.js</text>
  <text x="916" y="654" fill="#64748B" font-size="10" text-anchor="middle">/budget</text>

  <!-- utils & styles -->
  <rect x="70" y="694" width="455" height="44" rx="7" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="297" y="713" fill="#0A2342" font-size="11.5" font-weight="700" text-anchor="middle">utils/format.js</text>
  <text x="297" y="729" fill="#64748B" font-size="10.5" text-anchor="middle">Formato de moneda COP, fechas y cat&#225;logo de categor&#237;as</text>
  <rect x="555" y="694" width="455" height="44" rx="7" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="782" y="713" fill="#0A2342" font-size="11.5" font-weight="700" text-anchor="middle">styles/*.css</text>
  <text x="782" y="729" fill="#64748B" font-size="10.5" text-anchor="middle">tokens &#183; layout &#183; components &#183; auth (variables CSS)</text>

  <!-- Arrow to backend -->
  <line x1="540" y1="748" x2="540" y2="790" stroke="#0A2342" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="556" y="773" fill="#0A2342" font-size="11.5" font-weight="600">HTTP / JSON  &#183;  Authorization: Bearer &#60;JWT&#62;</text>

  <!-- Backend box -->
  <rect x="290" y="792" width="500" height="50" rx="9" fill="#0A2342"/>
  <text x="540" y="813" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">API Backend &#8212; FastAPI</text>
  <text x="540" y="831" fill="#02C39A" font-size="11.5" text-anchor="middle">http://localhost:8000/api</text>
</svg>
